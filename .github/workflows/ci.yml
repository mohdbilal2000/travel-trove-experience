name: CI

# Modern correctness gate — no Lighthouse lab scores. Real performance is
# tracked in the field via Vercel Speed Insights (LCP/INP/CLS). This pipeline
# guarantees the build is type-safe and the SEO/AEO/GEO structured data is valid
# before anything reaches production.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Validate structured data (JSON-LD)
        run: bun run validate:schema

      - name: Build
        run: bun run build
        env:
          # Robust against transient Google Fonts TLS hiccups during next/font.
          NEXT_TURBOPACK_EXPERIMENTAL_USE_SYSTEM_TLS_CERTS: '1'
